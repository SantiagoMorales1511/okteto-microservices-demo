services:
  postgresql:
    image: postgres:16
    environment:
      POSTGRES_USER: okteto
      POSTGRES_PASSWORD: okteto
      POSTGRES_DB: votes
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U okteto -d votes -h 127.0.0.1 -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30

  kafka:
    image: apache/kafka:3.7.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 30

  vote:
    build:
      context: ./vote
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      POSTGRES_USER: okteto
      POSTGRES_PASSWORD: okteto
      POSTGRES_DB: votes
    depends_on:
      kafka:
        condition: service_healthy
      postgresql:
        condition: service_healthy

  result:
    build:
      context: ./result
      dockerfile: Dockerfile
    environment:
      PORT: "80"
      DATABASE_URL: postgres://okteto:okteto@postgresql/votes
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "4000:80"

volumes:
  postgresql-data:
  kafka-data:

name: CI aplicación

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vote:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vote
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "22"
          cache: maven
      - run: mvn -B test

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: worker/go.mod
      - run: go test ./...

  result:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: result
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: node --check server.js

  docker:
    runs-on: ubuntu-latest
    needs: [vote, worker, result]
    strategy:
      matrix:
        service: [vote, worker, result]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: false
          tags: microservices-demo/${{ matrix.service }}:ci
